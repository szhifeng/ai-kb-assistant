services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: kb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"
volumes:
  pgdata:
